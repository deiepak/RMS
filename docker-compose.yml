version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-rms_db}
      MYSQL_USER: ${DB_USER:-rms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rms_pass_2026}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  server:
    build: ./server
    container_name: rms_server
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-rms_user}
      DB_PASSWORD: ${DB_PASSWORD:-rms_pass_2026}
      DB_NAME: ${DB_NAME:-rms_db}
      JWT_SECRET: ${JWT_SECRET:-rms_jwt_secret_2026_change_me}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/seeds:/app/seeds
      - ./server/uploads:/app/uploads
    command: npm run dev

  client:
    build: ./client
    container_name: rms_client
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://server:3001
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/vite.config.js:/app/vite.config.js
    # Exposing 5173 is optional since Caddy routes it, but useful for direct access
    ports:
      - "5173:5173"

  caddy:
    image: caddy:2-alpine
    container_name: rms_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - client
      - server

  tunnel:
    image: node:20-alpine
    container_name: rms_tunnel
    command: sh -c "npm install -g localtunnel && lt --port 80 --subdomain happyhillsrms --local-host caddy"
    restart: unless-stopped
    depends_on:
      - caddy

volumes:
  mysql_data:
    driver: local
