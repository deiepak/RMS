version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rms_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-rms_db}
      MYSQL_USER: ${DB_USER:-rms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rms_pass_2026}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: rms_server_prod
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-rms_user}
      DB_PASSWORD: ${DB_PASSWORD:-rms_pass_2026}
      DB_NAME: ${DB_NAME:-rms_db}
      JWT_SECRET: ${JWT_SECRET:-rms_jwt_secret_2026_change_me}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: rms_client_prod
    restart: always
    environment:
      - VITE_API_URL=https://${DOMAIN_NAME}/api
      - VITE_SOCKET_URL=https://${DOMAIN_NAME}

  caddy:
    image: caddy:2-alpine
    container_name: rms_caddy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

volumes:
  mysql_data_prod:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
